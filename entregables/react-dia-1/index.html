<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <title>Restaurante - DOM</title>

</head>

<body>

    <h1>Restaurante El Sabor Peruano</h1>

    <div id="carta"></div>

    <br>

    <button id="btnAgregar">
        Agregar plato
    </button>

    <script>

        let platos = [

            {
                id: 1,
                nombre: "Lomo saltado",
                categoria: "Segundos",
                precio: 18,
                stock: 3,
                disponible: true
            },

            {
                id: 2,
                nombre: "Arroz con pollo",
                categoria: "Segundos",
                precio: 12,
                stock: 5,
                disponible: true
            },

            {
                id: 3,
                nombre: "Sopa de verduras",
                categoria: "Entradas",
                precio: 8,
                stock: 0,
                disponible: false
            }

        ];

        function renderCarta(platos) {

            const carta = document.getElementById("carta");

            let html = "";

            for (const plato of platos) {

                html += `

                <div>

                    <h2>${plato.nombre}</h2>

                    <p>Categoría: ${plato.categoria}</p>

                    <p>Precio: S/ ${plato.precio}</p>

                    <p>Stock: ${plato.stock}</p>

                    <p>

                        ${plato.disponible
                        ? "✅ Disponible"
                        : "❌ No disponible"}

                    </p>

                </div>

                <hr>

                `;

            }

            carta.innerHTML = html;

        }

        renderCarta(platos);

        document
            .getElementById("btnAgregar")
            .addEventListener("click", () => {

                platos.push({

                    id: 4,

                    nombre: "Pollo a la brasa",

                    categoria: "Segundos",

                    precio: 20,

                    stock: 4,

                    disponible: true

                });

                renderCarta(platos);

            });

    </script>

</body>

</html>
