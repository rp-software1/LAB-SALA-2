<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <title>Restaurante React</title>

    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>

    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

</head>

<body>

    <h1>Restaurante El Sabor Peruano</h1>

    <div id="root"></div>

    <script type="text/babel">

        const platos = [

            {
                id: 1,
                nombre: "Lomo saltado",
                categoria: "Segundos",
                precio: 18,
                stock: 3,
                disponible: true
            },

            {
                id: 2,
                nombre: "Arroz con pollo",
                categoria: "Segundos",
                precio: 12,
                stock: 5,
                disponible: true
            },

            {
                id: 3,
                nombre: "Sopa de verduras",
                categoria: "Entradas",
                precio: 8,
                stock: 0,
                disponible: false
            }

        ];



        function Carta({ platos }) {

            return (

                <div>

                    {

                        platos.map(plato => (

                            <div key={plato.id}>

                                <h2>{plato.nombre}</h2>

                                <p>Categoría: {plato.categoria}</p>

                                <p>Precio: S/ {plato.precio}</p>

                                <p>Stock: {plato.stock}</p>

                                <p>

                                    Estado:

                                    {plato.disponible
                                        ? " Disponible"
                                        : " No disponible"}

                                </p>

                                <hr />

                            </div>

                        ))

                    }

                </div>

            );

        }



        const root = ReactDOM.createRoot(
            document.getElementById("root")
        );



        root.render(

            <Carta platos={platos} />

        );

    </script>

</body>

</html>
