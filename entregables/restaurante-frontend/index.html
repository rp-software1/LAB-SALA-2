<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurante SENATI</title>

    <style>

        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #f5f5f5;
        }

        header {
            background-color: #222;
            color: white;
            padding: 20px;
            text-align: center;
        }


        nav {
            background-color: #333;
            padding: 10px;
            text-align: center;
        }


        nav a {
            color: white;
            text-decoration: none;
            margin: 20px;
            font-size: 18px;
        }


        main {
            padding: 30px;
        }


        section {
            background: white;
            padding: 20px;
            margin-bottom: 25px;
            border-radius: 10px;
        }


        h2 {
            color: #333;
        }


        .plato {
            padding: 10px;
            border-bottom: 1px solid #ddd;
            font-size: 20px;
        }


        .mesa {
            display: inline-block;
            padding: 15px;
            margin: 10px;
            border-radius: 8px;
            color: white;
            font-weight: bold;
        }


        .libre {
            background-color: green;
        }


        .ocupada {
            background-color: red;
        }


        .reservada {
            background-color: orange;
        }


    </style>

</head>


<body>


<header>

    <h1>Restaurante SENATI</h1>

</header>



<nav>

    <a href="#">Carta</a>

    <a href="#">Mesas</a>

    <a href="#">Comandas</a>

</nav>



<main>


    <section>

        <h2>Carta del Restaurante</h2>


        <div class="plato">
            🍕 Pizza
        </div>


        <div class="plato">
            🍔 Hamburguesa
        </div>


        <div class="plato">
            🥗 Ensalada
        </div>


        <div class="plato">
            🍝 Pasta
        </div>


    </section>





    <section>

        <h2>Mesas del Restaurante</h2>


        <div class="mesa libre">
            🟢 Mesa 1
        </div>


        <div class="mesa ocupada">
            🔴 Mesa 2
        </div>


        <div class="mesa reservada">
            🟡 Mesa 3
        </div>


    </section>



</main>



</body>

</html>
